networks:
  kafka-net:
    driver: bridge

volumes:
  kafka-data:

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-net

  # Producer Microservice
  producer:
    build:
      context: .
      dockerfile: reddit_streamer/Dockerfile
    container_name: reddit-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: reddit-comments
      DATASET_PATH: datasets/lifestyle_progresspics.csv
      MESSAGE_DELAY_SEC: 0.1
    volumes:
      - ./datasets:/app/datasets
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-net
    restart: on-failure:3

  # Consumer Microservice (scalable)
  consumer:
    build:
      context: .
      dockerfile: comment_processor/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: reddit-comments
      CONSUMER_GROUP_ID: reddit-processors
      PROCESSING_DELAY_SEC: 1.0
    volumes:
      - ./logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
      producer:
        condition: service_started
    networks:
      - kafka-net
    restart: on-failure:3

  # Metrics Aggregator (runs once, can be triggered manually)
  aggregator:
    build:
      context: .
      dockerfile: metrics_aggregator/Dockerfile
    container_name: metrics-aggregator
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    networks:
      - kafka-net
    profiles:
      - metrics